<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILTI 招標資料採集中心</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor blur-1"></div>
    <div class="background-decor blur-2"></div>

    <div class="container">
        <header class="header animate__animated animate__fadeInDown">
            <h1 class="glow-text">招標資料採集中心</h1>
            <p class="subtitle">輸入招標網址，自動代入 Google Sheets 欄位</p>
        </header>

        <div class="grid-layout">
            <!-- 左側：輸入與紀錄 -->
            <div class="left-col">
                <main class="main-content glass-card animate__animated animate__fadeInUp">
                    <div id="single-ui">
                        <div class="input-group">
                            <label for="url-input">標案公告詳細網址 (支援多筆一起貼上換行)</label>
                            <textarea id="url-input" rows="5" placeholder="請將剛才書籤複製下來的多筆網址直接貼在這裡...&#10;https://web.pcc.gov.tw/...&#10;https://web.pcc.gov.tw/..." autocomplete="off"></textarea>
                        </div>
                        
                        <div id="batch-progress" class="batch-status-bar hidden" style="margin-bottom: 2rem;">
                            <div class="progress-info" id="progress-info-text">目前進度: 0 / 0</div>
                            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
                        </div>

                        <button id="fetch-btn" class="primary-btn">
                            <i class="fas fa-rocket"></i> 開始抓取
                        </button>
                    </div>

                    <div id="status-display" class="status-box hidden">
                        <div class="status-icon"><i id="status-icon-inner" class="fas fa-check-circle"></i></div>
                        <div class="status-content">
                            <h3 id="msg-title">存進去了！</h3>
                            <p id="msg-details">資料已成功傳送至雲端試算表。</p>
                        </div>
                    </div>
                </main>

                <!-- 數據儀表板放在輸入下方 -->
                <section class="stats-grid animate__animated animate__fadeInUp animate__delay-1s">
                    <div class="stat-card glass-card">
                        <i class="fas fa-file-invoice stat-icon"></i>
                        <div id="count-total" class="stat-value">0</div>
                        <div class="stat-label">今日成功抓取筆數</div>
                    </div>
                    <div class="stat-card glass-card">
                        <i class="fas fa-microchip stat-icon"></i>
                        <div id="quota-ws" class="stat-value">---</div>
                        <div class="stat-label">WebScraping.AI</div>
                        <div class="stat-detail">
                            <span>總額: <span id="total-ws">---</span></span>
                            <span>重置: <span id="reset-ws" class="reset-time">---</span></span>
                        </div>
                    </div>
                    <div class="stat-card glass-card">
                        <i class="fas fa-rocket stat-icon"></i>
                        <div id="quota-sa" class="stat-value">---</div>
                        <div class="stat-label">ScrapingAnt</div>
                        <div class="stat-detail">
                            <span>總額: <span id="total-sa">---</span></span>
                            <span>重置: <span id="reset-sa" class="reset-time">---</span></span>
                        </div>
                    </div>
                    <div class="stat-card glass-card">
                        <i class="fas fa-shield-alt stat-icon"></i>
                        <div id="quota-sd" class="stat-value">---</div>
                        <div class="stat-label">scrape.do</div>
                        <div class="stat-detail">
                            <span>總額: <span id="total-sd">---</span></span>
                            <span>重置: <span id="reset-sd" class="reset-time">---</span></span>
                        </div>
                    </div>
                </section>
            </div>

            <!-- 右側：最近活動 (佔 2/3) -->
            <div class="right-col">
                <section class="log-section glass-card animate__animated animate__fadeInUp animate__delay-2s" style="margin-top: 0; min-height: 500px;">
                    <div class="result-title"><i class="fas fa-history"></i> 最近活動</div>
                    <div id="log-list">
                        <!-- Log items will appear here -->
                        <div class="log-loading-placeholder" style="color:var(--text-muted); padding: 1rem; text-align: center;">系統就緒中...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbnZu4OewTEeE4yekBkhcCpCWtXz5bjAUGSMskURqPQQRogwx6nlOeZUiMn_tQVd7f/exec";
        // -------------

        const fetchBtn = document.getElementById('fetch-btn');
        const urlInput = document.getElementById('url-input');
        const countTotal = document.getElementById('count-total');
        const quotaWs = document.getElementById('quota-ws');
        const quotaSa = document.getElementById('quota-sa');
        const quotaSd = document.getElementById('quota-sd');
        const logList = document.getElementById('log-list');
        const statusBox = document.getElementById('status-display');
        const msgTitle = document.getElementById('msg-title');
        const msgDetails = document.getElementById('msg-details');

        const batchProgress = document.getElementById('batch-progress');
        const progressFill = document.getElementById('progress-fill');
        const progressInfoText = document.getElementById('progress-info-text');

        let sessionTotal = 0;
        let isFetching = false;
        let isStopped = false;

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressInfoText.innerHTML = text;
        }

        fetchBtn.addEventListener('click', async () => {
            if (isFetching) {
                isStopped = true;
                return;
            }

            const lines = urlInput.value.split('\n').map(l => l.trim()).filter(l => l && l.startsWith('http'));
            if (lines.length === 0) return showResult("錯誤", "請貼上有效的標案網址(需包含 http:// 或是 https://)", true);

            isFetching = true;
            isStopped = false;
            fetchBtn.innerHTML = '<i class="fas fa-stop-circle"></i> 停止抓取';
            fetchBtn.style.background = 'linear-gradient(135deg, #ff1744 0%, #aa00ff 100%)';
            
            batchProgress.classList.remove('hidden');
            updateProgress(0, `準備啟動... (共 ${lines.length} 筆)`);

            let successCount = 0;
            let dupCount = 0;
            let failCount = 0;

            // --- 第一層防護：極速查閱資料庫網址 ---
            updateProgress(2, `正在進行第一層防護：極速免費過濾已存網址...`);
            let isDuplicateArray = [];
            try {
                const checkRes = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "preCheckUrls", urls: lines })
                });
                const checkJson = await checkRes.json();
                if (checkJson.status === "PreCheckDone") {
                    isDuplicateArray = checkJson.data;
                }
            } catch (e) {
                console.error("預先排查失敗", e);
            }
            // ---------------------------------

            for (let i = 0; i < lines.length; i++) {
                if (isStopped) {
                    showResult("已手動停止", `任務中斷。成功:${successCount} 筆，重複:${dupCount} 筆`, false);
                    updateProgress(100, `任務中斷！ (停在 ${i} / ${lines.length} 筆)`);
                    break;
                }

                const url = lines[i];
                let progressPercent = ((i) / lines.length) * 100;
                
                showResult(`正在抓取第 ${i+1} 筆`, `目標：${url}`, false);
                updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">正在連線擷取資料...</small>`);

                // 檢查第一層防護結果
                if (isDuplicateArray[i]) {
                    showResult("秒殺略過 (第一層防護)", "發現這份網址早就在試算表裡囉！", true);
                    addLog(url, "略過：查無須扣費");
                    dupCount++;
                    
                    progressPercent = ((i + 1) / lines.length) * 100;
                    updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">免費跳過第 ${i+1} 筆</small>`);
                    continue; // 💥 直接跳過這次迴圈的後續動作，省下一次 API 與 6 秒等待！
                }

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ url: url })
                    });
                    const result = await response.json();
                    
                    if (result.status === "Success") {
                        showResult("進去了！", result.message, false);
                        // 將後台傳來的 "由 XXX (計費) 抓取成功！" 縮減保留關鍵字顯示在 Log 區
                        let logMsg = result.message.replace("由 ", "").replace(" 抓取成功！", "");
                        addLog(url, "成功：" + logMsg);
                        sessionTotal++;
                        successCount++;
                        countTotal.innerText = sessionTotal;
                    } else if (result.status === "Duplicate") {
                        showResult("重複略過", result.message, true);
                        addLog(url, "重複略過");
                        dupCount++;
                    } else if (result.status === "Captcha") {
                        showResult("防護牆攔截", result.message, true);
                        addLog(url, "遇到驗證");
                        failCount++;
                    } else {
                        showResult("抓取失敗", result.message, true);
                        addLog(url, "失敗");
                        failCount++;
                    }
                    if(result.quotas || (result.data && result.data.quotas)) {
                        updateQuotaUI(result.quotas || result.data.quotas);
                    }
                } catch (error) {
                    console.error(error);
                    addLog(url, "連線錯誤");
                    failCount++;
                }

                // 完成單筆的進度推進
                progressPercent = ((i + 1) / lines.length) * 100;
                updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">第 ${i+1} 筆處理已完成</small>`);

                if (i < lines.length - 1 && !isStopped) {
                    for (let sec = 10; sec > 0; sec--) {
                        if (isStopped) break;
                        showResult(`冷卻中 (${i+1}/${lines.length})`, `為了躲避防護牆，${sec} 秒後抓取下一筆...`, false);
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
            }

            if (!isStopped) {
                showResult("任務完成", `全部跑完了！成功:${successCount}，重複:${dupCount}，失敗待查:${failCount}`, failCount > 0);
                updateProgress(100, `<strong>目前進度： ( ${lines.length} / ${lines.length} ) 筆 - 圓滿完成！</strong>`);
                urlInput.value = ""; // 清空輸入框
            }

            isFetching = false;
            fetchBtn.innerHTML = '<i class="fas fa-rocket"></i> 開始抓取';
            fetchBtn.style.background = 'linear-gradient(135deg, #7c4dff 0%, #448aff 100%)';
            fetchQuotas(); 
        });

        async function fetchQuotas() {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "getQuota" })
                });
                const result = await response.json();
                if (result.status === "QuotaInfo") {
                    updateQuotaUI(result.data);
                }
            } catch (e) {
                console.error("無法取得額度", e);
            }
        }

        function updateQuotaUI(data) {
            if (!data) return;
            
            // WebScraping.AI
            if (data.webscraping_ai) {
                quotaWs.innerText = data.webscraping_ai.remain ?? "N/A";
                document.getElementById('total-ws').innerText = data.webscraping_ai.total ?? "N/A";
                document.getElementById('reset-ws').innerText = data.webscraping_ai.reset ?? "N/A";
            }
            
            // ScrapingAnt
            if (data.scrapingant) {
                quotaSa.innerText = data.scrapingant.remain ?? "N/A";
                document.getElementById('total-sa').innerText = data.scrapingant.total ?? "N/A";
                document.getElementById('reset-sa').innerText = data.scrapingant.reset ?? "N/A";
            }
            
            // scrape.do
            if (data.scrapedo) {
                quotaSd.innerText = data.scrapedo.remain ?? "N/A";
                document.getElementById('total-sd').innerText = data.scrapedo.total ?? "N/A";
                document.getElementById('reset-sd').innerText = data.scrapedo.reset ?? "N/A";
            }
        }

        function showResult(title, details, isError) {
            statusBox.classList.remove('hidden', 'status-error', 'status-success');
            statusBox.classList.add(isError ? 'status-error' : 'status-success');
            msgTitle.innerText = title;
            msgDetails.innerText = details;
            
            const icon = document.getElementById('status-icon-inner');
            icon.className = isError ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle';
        }

        function addLog(url, status) {
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `
                <div class="log-info">
                    <div class="log-url" style="word-break: break-all; opacity: 0.8; font-size: 0.85em;">${url}</div>
                    <div class="log-time">${time}</div>
                </div>
                <div class="log-status ${status.includes('成功') ? 'success' : 'error'}">${status}</div>
            `;
            if (logList.querySelector('.log-loading-placeholder')) {
                logList.innerHTML = '';
            }
            logList.insertBefore(logItem, logList.firstChild);
        }

        async function callGas(params) {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(params)
            });
            return await response.json();
        }

        // 初始化
        fetchQuotas();
    </script>
</body>
</html>
