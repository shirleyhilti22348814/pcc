<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILTI 招標資料採集中心</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor blur-1"></div>
    <div class="background-decor blur-2"></div>

    <div class="container">
        <header class="header animate__animated animate__fadeInDown">
            <h1 class="glow-text">招標資料採集中心</h1>
            <p class="subtitle">輸入招標網址，自動代入 Google Sheets 欄位</p>
        </header>

        <div class="grid-layout">
            <!-- 左側：輸入與紀錄 -->
            <div class="left-col">
                <main class="main-content glass-card animate__animated animate__fadeInUp">
                    <div id="single-ui">
                        <div class="input-group">
                            <label for="url-input">標案公告詳細網址 (支援多筆一起貼上換行)</label>
                            <textarea id="url-input" rows="5" placeholder="請將剛才書籤複製下來的多筆網址直接貼在這裡...&#10;https://web.pcc.gov.tw/...&#10;https://web.pcc.gov.tw/..." autocomplete="off"></textarea>
                        </div>
                        
                        <div id="batch-progress" class="batch-status-bar hidden" style="margin-bottom: 2rem;">
                            <div class="progress-info" id="progress-info-text">目前進度: 0 / 0</div>
                            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
                        </div>

                        <button id="fetch-btn" class="primary-btn">
                            <i class="fas fa-rocket"></i> 開始抓取
                        </button>
                    </div>

                    <div id="status-display" class="status-box hidden">
                        <div class="status-icon"><i id="status-icon-inner" class="fas fa-check-circle"></i></div>
                        <div class="status-content">
                            <h3 id="msg-title">存進去了！</h3>
                            <p id="msg-details">資料已成功傳送至雲端試算表。</p>
                        </div>
                    </div>
                </main>

                <!-- 數據儀表板放在輸入下方 -->
                <section class="dashboard-grid animate__animated animate__fadeInUp animate__delay-1s">
                    <!-- 核心數據：今日總計 -->
                    <div class="dash-card main-stat glass-card">
                        <div class="dash-icon"><i class="fas fa-chart-line"></i></div>
                        <div class="dash-info">
                            <span class="dash-label">今日採集總數</span>
                            <h2 id="count-total" class="dash-value">0</h2>
                        </div>
                    </div>

                    <!-- API 狀態區：WebScraping.AI -->
                    <div class="dash-card api-group glass-card">
                        <div class="group-header">
                            <i class="fas fa-microchip"></i> <span>WebScraping.AI</span>
                        </div>
                        <div class="api-instances">
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-ws-1" class="progress-ring__circle" stroke="#7c4dff" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-ws" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#1</div>
                            </div>
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-ws-2" class="progress-ring__circle" stroke="#7c4dff" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-ws-2" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#2</div>
                            </div>
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-ws-3" class="progress-ring__circle" stroke="#7c4dff" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-ws-3" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#3</div>
                            </div>
                        </div>
                        <div class="group-footer">
                            <span class="reset-info"><i class="far fa-clock"></i> <span id="reset-ws-combined">重置: ---</span></span>
                        </div>
                    </div>

                    <!-- API 狀態區：ScrapingAnt -->
                    <div class="dash-card api-group glass-card">
                        <div class="group-header">
                            <i class="fas fa-rocket"></i> <span>ScrapingAnt</span>
                        </div>
                        <div class="api-instances">
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-sa-1" class="progress-ring__circle" stroke="#00bcd4" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-sa" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#1</div>
                            </div>
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-sa-2" class="progress-ring__circle" stroke="#00bcd4" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-sa-2" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#2</div>
                            </div>
                            <div class="api-instance">
                                <div class="progress-ring-container">
                                    <svg class="progress-ring" width="60" height="60">
                                        <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="4" fill="transparent" r="26" cx="30" cy="30"/>
                                        <circle id="ring-sa-3" class="progress-ring__circle" stroke="#00bcd4" stroke-width="4" stroke-dasharray="163.36 163.36" stroke-dashoffset="163.36" stroke-linecap="round" fill="transparent" r="26" cx="30" cy="30"/>
                                    </svg>
                                    <div id="quota-sa-3" class="ring-text">---</div>
                                </div>
                                <div class="api-label">#3</div>
                            </div>
                        </div>
                        <div class="group-footer">
                            <span class="reset-info"><i class="far fa-clock"></i> <span id="reset-sa-combined">重置: ---</span></span>
                        </div>
                    </div>

                </section>
            </div>

            <!-- 右側：最近活動 (佔 2/3) -->
            <div class="right-col">
                <section class="log-section glass-card animate__animated animate__fadeInUp animate__delay-2s" style="margin-top: 0; min-height: 500px;">
                    <div class="result-title"><i class="fas fa-history"></i> 最近活動</div>
                    <div id="log-list">
                        <!-- Log items will appear here -->
                        <div class="log-loading-placeholder" style="color:var(--text-muted); padding: 1rem; text-align: center;">系統就緒中...</div>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbnZu4OewTEeE4yekBkhcCpCWtXz5bjAUGSMskURqPQQRogwx6nlOeZUiMn_tQVd7f/exec";
        // -------------

        const fetchBtn = document.getElementById('fetch-btn');
        const urlInput = document.getElementById('url-input');
        const countTotal = document.getElementById('count-total');
        const quotaWs = document.getElementById('quota-ws');
        const quotaWs2 = document.getElementById('quota-ws-2');
        const quotaWs3 = document.getElementById('quota-ws-3');
        const quotaSa = document.getElementById('quota-sa');
        const quotaSa2 = document.getElementById('quota-sa-2');
        const quotaSa3 = document.getElementById('quota-sa-3');
        const logList = document.getElementById('log-list');
        const statusBox = document.getElementById('status-display');
        const msgTitle = document.getElementById('msg-title');
        const msgDetails = document.getElementById('msg-details');

        const batchProgress = document.getElementById('batch-progress');
        const progressFill = document.getElementById('progress-fill');
        const progressInfoText = document.getElementById('progress-info-text');

        let sessionTotal = 0;
        let isFetching = false;
        let isStopped = false;

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressInfoText.innerHTML = text;
        }

        fetchBtn.addEventListener('click', async () => {
            if (isFetching) {
                isStopped = true;
                return;
            }

            const lines = urlInput.value.split('\n').map(l => l.trim()).filter(l => l && l.startsWith('http'));
            if (lines.length === 0) return showResult("錯誤", "請貼上有效的標案網址(需包含 http:// 或是 https://)", true);

            isFetching = true;
            isStopped = false;
            fetchBtn.innerHTML = '<i class="fas fa-stop-circle"></i> 停止抓取';
            fetchBtn.style.background = 'linear-gradient(135deg, #ff1744 0%, #aa00ff 100%)';
            
            batchProgress.classList.remove('hidden');
            updateProgress(0, `準備啟動... (共 ${lines.length} 筆)`);

            let successCount = 0;
            let dupCount = 0;
            let failCount = 0;

            // --- 第一層防護：極速查閱資料庫網址 ---
            updateProgress(2, `正在進行第一層防護：極速免費過濾已存網址...`);
            let isDuplicateArray = [];
            try {
                const checkRes = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "preCheckUrls", urls: lines })
                });
                const checkJson = await checkRes.json();
                if (checkJson.status === "PreCheckDone") {
                    isDuplicateArray = checkJson.data;
                }
            } catch (e) {
                console.error("預先排查失敗", e);
            }
            // ---------------------------------

            for (let i = 0; i < lines.length; i++) {
                if (isStopped) {
                    showResult("已手動停止", `任務中斷。成功:${successCount} 筆，重複:${dupCount} 筆`, false);
                    updateProgress(100, `任務中斷！ (停在 ${i} / ${lines.length} 筆)`);
                    break;
                }

                const url = lines[i];
                let progressPercent = ((i) / lines.length) * 100;
                
                showResult(`正在抓取第 ${i+1} 筆`, `目標：${url}`, false);
                updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">正在連線擷取資料...</small>`);

                // 檢查第一層防護結果
                if (isDuplicateArray[i]) {
                    showResult("秒殺略過 (第一層防護)", "發現這份網址早就在試算表裡囉！", true);
                    addLog(url, "略過：查無須扣費");
                    dupCount++;
                    
                    progressPercent = ((i + 1) / lines.length) * 100;
                    updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">免費跳過第 ${i+1} 筆</small>`);
                    continue; // 💥 直接跳過這次迴圈的後續動作，省下一次 API 與 6 秒等待！
                }

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify({ url: url })
                    });
                    const result = await response.json();
                    
                    if (result.status === "Success") {
                        showResult("進去了！", result.message, false);
                        // 將後台傳來的 "由 XXX (計費) 抓取成功！" 縮減保留關鍵字顯示在 Log 區
                        let logMsg = result.message.replace("由 ", "").replace(" 抓取成功！", "");
                        addLog(url, "成功：" + logMsg);
                        sessionTotal++;
                        successCount++;
                        countTotal.innerText = sessionTotal;
                    } else if (result.status === "Duplicate") {
                        showResult("重複略過", result.message, true);
                        addLog(url, "重複略過");
                        dupCount++;
                    } else if (result.status === "Captcha") {
                        showResult("防護牆攔截", result.message, true);
                        addLog(url, "遇到驗證");
                        failCount++;
                    } else {
                        showResult("抓取失敗", result.message, true);
                        addLog(url, "失敗");
                        failCount++;
                    }
                    if(result.quotas || (result.data && result.data.quotas)) {
                        updateQuotaUI(result.quotas || result.data.quotas);
                    }
                } catch (error) {
                    console.error(error);
                    addLog(url, "連線錯誤");
                    failCount++;
                }

                // 完成單筆的進度推進
                progressPercent = ((i + 1) / lines.length) * 100;
                updateProgress(progressPercent, `<strong>目前進度： ( ${i+1} / ${lines.length} ) 筆</strong> <br><small style="opacity:0.7">第 ${i+1} 筆處理已完成</small>`);

                if (i < lines.length - 1 && !isStopped) {
                    // 隨機產生 4000 至 6000 毫秒的延遲
                    const randomDelay = Math.floor(Math.random() * (6000 - 4000 + 1)) + 4000;
                    const startTime = Date.now();
                    
                    while (Date.now() - startTime < randomDelay) {
                        if (isStopped) break;
                        const remaining = Math.max(0, (randomDelay - (Date.now() - startTime)) / 1000).toFixed(1);
                        showResult(`冷卻中 (${i+1}/${lines.length})`, `為了躲避防護牆，隨機延遲 ${remaining} 秒後抓取下一筆...`, false);
                        await new Promise(r => setTimeout(r, 100));
                    }
                }
            }

            if (!isStopped) {
                showResult("任務完成", `全部跑完了！成功:${successCount}，重複:${dupCount}，失敗待查:${failCount}`, failCount > 0);
                updateProgress(100, `<strong>目前進度： ( ${lines.length} / ${lines.length} ) 筆 - 圓滿完成！</strong>`);
                urlInput.value = ""; // 清空輸入框
            }

            isFetching = false;
            fetchBtn.innerHTML = '<i class="fas fa-rocket"></i> 開始抓取';
            fetchBtn.style.background = 'linear-gradient(135deg, #7c4dff 0%, #448aff 100%)';
            fetchQuotas(); 
        });

        async function fetchQuotas() {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "getQuota" })
                });
                const result = await response.json();
                if (result.status === "QuotaInfo") {
                    updateQuotaUI(result.data);
                    // 額外強制觸獲一次更新，確保 DOM 完全渲染後才執行繪製
                    setTimeout(() => updateQuotaUI(result.data), 100);
                }
            } catch (e) {
                console.error("無法取得額度", e);
            }
        }

        function updateQuotaUI(data) {
            if (!data) return;
            
            const setRing = (id, rV, tV) => {
                const ring = document.getElementById(id);
                if (!ring) return;
                
                const cur = Number(rV);
                let max = Number(tV);
                
                // 致命修正：WebScraping.AI 的後端資料沒有 total，預設會是 "---" (NaN)
                if (isNaN(max) || max <= 0) {
                    if (id.includes('ws')) max = 2000; // WebScraping 的預設總額
                    else max = 1;
                }
                
                const circ = 163.36;

                // 比例計算
                let pct = cur / max;
                pct = Math.min(1.0, Math.max(0.0, pct));
                
                // 顏色判斷
                let col = "#7c4dff"; 
                if (id.includes('sa')) col = "#00bcd4";
                if (pct < 0.2) col = "#ff1744";
                else if (pct < 0.5) col = "#ffab40";

                // 設定 SVG 屬性 (回到與 ScrapingAnt 一致的 offset 模式)
                ring.setAttribute('stroke-dasharray', `${circ} ${circ}`);
                ring.setAttribute('stroke-dashoffset', circ * (1 - pct));
                ring.style.stroke = col;
                ring.style.opacity = "1";
                ring.style.visibility = "visible";
            };

            // WebScraping.AI
            if (data.webscraping_ai) {
                quotaWs.innerText = data.webscraping_ai.remain ?? "---";
                setRing('ring-ws-1', data.webscraping_ai.remain, data.webscraping_ai.total);
                document.getElementById('reset-ws-combined').innerText = "重置: " + (data.webscraping_ai.reset ?? "---");
            }
            if (data.webscraping_ai_2) {
                quotaWs2.innerText = data.webscraping_ai_2.remain ?? "---";
                setRing('ring-ws-2', data.webscraping_ai_2.remain, data.webscraping_ai_2.total);
            }
            if (data.webscraping_ai_3) {
                quotaWs3.innerText = data.webscraping_ai_3.remain ?? "---";
                setRing('ring-ws-3', data.webscraping_ai_3.remain, data.webscraping_ai_3.total);
            }
            
            // ScrapingAnt
            if (data.scrapingant) {
                quotaSa.innerText = data.scrapingant.remain ?? "---";
                setRing('ring-sa-1', data.scrapingant.remain, data.scrapingant.total);
                document.getElementById('reset-sa-combined').innerText = "重置: " + (data.scrapingant.reset ?? "---");
            }
            if (data.scrapingant_2) {
                quotaSa2.innerText = data.scrapingant_2.remain ?? "---";
                setRing('ring-sa-2', data.scrapingant_2.remain, data.scrapingant_2.total);
            }
            if (data.scrapingant_3) {
                quotaSa3.innerText = data.scrapingant_3.remain ?? "---";
                setRing('ring-sa-3', data.scrapingant_3.remain, data.scrapingant_3.total);
            }

        }

        function showResult(title, details, isError) {
            statusBox.classList.remove('hidden', 'status-error', 'status-success');
            statusBox.classList.add(isError ? 'status-error' : 'status-success');
            msgTitle.innerText = title;
            msgDetails.innerText = details;
            
            const icon = document.getElementById('status-icon-inner');
            icon.className = isError ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle';
        }

        function addLog(url, status) {
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `
                <div class="log-info">
                    <div class="log-url" style="word-break: break-all; opacity: 0.8; font-size: 0.85em;">${url}</div>
                    <div class="log-time">${time}</div>
                </div>
                <div class="log-status ${status.includes('成功') ? 'success' : 'error'}">${status}</div>
            `;
            if (logList.querySelector('.log-loading-placeholder')) {
                logList.innerHTML = '';
            }
            logList.insertBefore(logItem, logList.firstChild);
        }

        async function callGas(params) {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(params)
            });
            return await response.json();
        }

        // 初始化
        fetchQuotas();
    </script>
</body>
</html>
