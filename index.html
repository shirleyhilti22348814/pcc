<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HILTI 招標資料採集中心</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor blur-1"></div>
    <div class="background-decor blur-2"></div>

    <div class="container">
        <header class="header animate__animated animate__fadeInDown">
            <h1 class="glow-text">招標資料採集中心</h1>
            <p class="subtitle">輸入招標網址，自動代入 Google Sheets 欄位</p>
        </header>

        <main class="main-content glass-card animate__animated animate__fadeInUp">
            <div class="mode-switch">
                <button id="mode-single" class="tab-btn active">單筆抓取</button>
                <button id="mode-batch" class="tab-btn">總覽批次 (前5筆)</button>
            </div>

            <div id="single-ui">
                <div class="input-group">
                    <label for="url-input">標案公告詳細網址 (QueryAtmAwardDetail)</label>
                    <input type="text" id="url-input" placeholder="https://web.pcc.gov.tw/tps/..." autocomplete="off">
                </div>
                <button id="fetch-btn" class="primary-btn">
                    <i class="fas fa-cloud-download-alt"></i> 抓取並存檔
                </button>
            </div>

            <div id="batch-ui" class="hidden">
                <div class="input-group">
                    <label for="batch-url-input">總覽頁搜尋結果網址 (readTenderAgent)</label>
                    <input type="text" id="batch-url-input" placeholder="https://web.pcc.gov.tw/prkms/..." autocomplete="off">
                </div>
                <button id="batch-btn" class="primary-btn">
                    <i class="fas fa-layer-group"></i> 開始批次排查與抓取
                </button>
                <div id="batch-progress" class="batch-status-bar hidden">
                    <div class="progress-info">正在準備批次任務...</div>
                    <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
                </div>
            </div>

            <div id="status-display" class="status-box hidden">
                <div class="status-icon"><i id="status-icon-inner" class="fas fa-check-circle"></i></div>
                <div class="status-content">
                    <h3 id="msg-title">存進去了！</h3>
                    <p id="msg-details">資料已成功傳送至雲端試算表。</p>
                </div>
            </div>
        </main>

        <!-- 數據儀表板 -->
        <section class="stats-grid animate__animated animate__fadeInUp animate__delay-1s">
            <div class="stat-card glass-card">
                <i class="fas fa-file-invoice stat-icon"></i>
                <div id="count-total" class="stat-value">0</div>
                <div class="stat-label">今日抓取筆數</div>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-microchip stat-icon"></i>
                <div id="quota-ws" class="stat-value">---</div>
                <div class="stat-label">WebScraping.AI</div>
                <div class="stat-detail">
                    <span>總額: <span id="total-ws">---</span></span>
                    <span>重置: <span id="reset-ws" class="reset-time">---</span></span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-rocket stat-icon"></i>
                <div id="quota-sa" class="stat-value">---</div>
                <div class="stat-label">ScrapingAnt</div>
                <div class="stat-detail">
                    <span>總額: <span id="total-sa">---</span></span>
                    <span>重置: <span id="reset-sa" class="reset-time">---</span></span>
                </div>
            </div>
            <div class="stat-card glass-card">
                <i class="fas fa-shield-alt stat-icon"></i>
                <div id="quota-sd" class="stat-value">---</div>
                <div class="stat-label">scrape.do</div>
                <div class="stat-detail">
                    <span>總額: <span id="total-sd">---</span></span>
                    <span>重置: <span id="reset-sd" class="reset-time">---</span></span>
                </div>
            </div>
        </section>

        <!-- 最近活動 -->
        <section class="log-section glass-card animate__animated animate__fadeInUp animate__delay-2s">
            <div class="result-title"><i class="fas fa-history"></i> 最近活動</div>
            <div id="log-list">
                <!-- Log items will appear here -->
                <div class="log-loading-placeholder" style="color:var(--text-muted); padding: 1rem; text-align: center;">系統就緒中...</div>
            </div>
        </section>
    </div>

    <script>
        // --- 設定區 ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbnZu4OewTEeE4yekBkhcCpCWtXz5bjAUGSMskURqPQQRogwx6nlOeZUiMn_tQVd7f/exec";
        // -------------

        const fetchBtn = document.getElementById('fetch-btn');
        const urlInput = document.getElementById('url-input');
        const countTotal = document.getElementById('count-total');
        const quotaWs = document.getElementById('quota-ws');
        const quotaSa = document.getElementById('quota-sa');
        const quotaSd = document.getElementById('quota-sd');
        const logList = document.getElementById('log-list');
        const statusBox = document.getElementById('status-display');
        const msgTitle = document.getElementById('msg-title');
        const msgDetails = document.getElementById('msg-details');

        // 批次相關
        const batchBtn = document.getElementById('batch-btn');
        const batchUrlInput = document.getElementById('batch-url-input');
        const batchProgress = document.getElementById('batch-progress');
        const progressFill = document.getElementById('progress-fill');
        const progressInfo = batchProgress.querySelector('.progress-info');
        const singleUi = document.getElementById('single-ui');
        const batchUi = document.getElementById('batch-ui');
        const modeSingle = document.getElementById('mode-single');
        const modeBatch = document.getElementById('mode-batch');

        modeSingle.addEventListener('click', () => {
            modeSingle.classList.add('active');
            modeBatch.classList.remove('active');
            singleUi.classList.remove('hidden');
            batchUi.classList.add('hidden');
        });

        modeBatch.addEventListener('click', () => {
            modeBatch.classList.add('active');
            modeSingle.classList.remove('active');
            batchUi.classList.remove('hidden');
            singleUi.classList.add('hidden');
        });

        let sessionTotal = 0;

        fetchBtn.addEventListener('click', async () => {
            const url = urlInput.value.trim();
            if (!url) return showResult("錯誤", "請輸入完整的招標網址", true);

            setLoading(true);
            showResult("處理中...", "正在透過多重代理進行深度抓取，請稍候。", false);

            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ url: url })
                });

                const result = await response.json();
                
                if (result.status === "Success") {
                    showResult("存進去了！", result.message, false);
                    updateQuotaUI(result.quotas || (result.data ? result.data.quotas : null));
                    addLog(url, "成功存儲");
                    sessionTotal++;
                    countTotal.innerText = sessionTotal;
                    urlInput.value = "";
                } else if (result.status === "Duplicate") {
                    showResult("重複警告", result.message, true);
                    addLog(url, "重複略過");
                } else if (result.status === "Captcha") {
                    showResult("遇到防護牆", result.message, true);
                    addLog(url, "需手動驗證");
                } else {
                    showResult("抓取失敗", result.message, true);
                    addLog(url, "失敗");
                }

            } catch (error) {
                console.error(error);
                showResult("連線失敗", "請確認是否已上傳 GitHub 且 GAS 部署正確。", true);
            } finally {
                setLoading(false);
                fetchQuotas(); // 每次抓完刷新額度
            }
        });

        async function fetchQuotas() {
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "getQuota" })
                });
                const result = await response.json();
                if (result.status === "QuotaInfo") {
                    updateQuotaUI(result.data);
                }
            } catch (e) {
                console.error("無法取得額度", e);
            }
        }

        function updateQuotaUI(data) {
            if (!data) return;
            
            // WebScraping.AI
            if (data.webscraping_ai) {
                quotaWs.innerText = data.webscraping_ai.remain ?? "N/A";
                document.getElementById('total-ws').innerText = data.webscraping_ai.total ?? "N/A";
                document.getElementById('reset-ws').innerText = data.webscraping_ai.reset ?? "N/A";
            }
            
            // ScrapingAnt
            if (data.scrapingant) {
                quotaSa.innerText = data.scrapingant.remain ?? "N/A";
                document.getElementById('total-sa').innerText = data.scrapingant.total ?? "N/A";
                document.getElementById('reset-sa').innerText = data.scrapingant.reset ?? "N/A";
            }
            
            // scrape.do
            if (data.scrapedo) {
                quotaSd.innerText = data.scrapedo.remain ?? "N/A";
                document.getElementById('total-sd').innerText = data.scrapedo.total ?? "N/A";
                document.getElementById('reset-sd').innerText = data.scrapedo.reset ?? "N/A";
            }
        }

        function showResult(title, details, isError) {
            statusBox.classList.remove('hidden', 'status-error', 'status-success');
            statusBox.classList.add(isError ? 'status-error' : 'status-success');
            msgTitle.innerText = title;
            msgDetails.innerText = details;
            
            const icon = document.getElementById('status-icon-inner');
            icon.className = isError ? 'fas fa-exclamation-triangle' : 'fas fa-check-circle';
        }

        function setLoading(isLoading) {
            fetchBtn.disabled = isLoading;
            fetchBtn.innerHTML = isLoading ? '<i class="fas fa-spinner fa-spin"></i> 處理中...' : '<i class="fas fa-cloud-download-alt"></i> 抓取並存檔';
        }

        function addLog(url, status) {
            const time = new Date().toLocaleTimeString();
            const logItem = document.createElement('div');
            logItem.className = 'log-item';
            logItem.innerHTML = `
                <div class="log-info">
                    <div class="log-url">${url.length > 50 ? url.substring(0, 50) + '...' : url}</div>
                    <div class="log-time">${time}</div>
                </div>
                <div class="log-status ${status.includes('成功') ? 'success' : 'error'}">${status}</div>
            `;
            if (logList.querySelector('.log-loading-placeholder')) {
                logList.innerHTML = '';
            }
            logList.insertBefore(logItem, logList.firstChild);
        }

        // 批次抓取邏輯
        batchBtn.addEventListener('click', async () => {
            const overviewUrl = batchUrlInput.value.trim();
            if (!overviewUrl) return showResult("錯誤", "請輸入總覽頁網址", true);

            setLoading(true);
            batchProgress.classList.remove('hidden');
            updateProgress(0, "正在解析總覽頁...");

            try {
                // 1. 抓取總覽頁並解析網址
                const overviewRes = await callGas({ action: "parseOverview", url: overviewUrl });
                if (overviewRes.status !== "OverviewData") throw new Error(overviewRes.message);
                
                let items = overviewRes.data;
                if (!items || items.length === 0) throw new Error("未在頁面中找到標案資料");

                // 2. 限制前 5 筆
                items = items.slice(0, 5);
                updateProgress(10, `找到 ${items.length} 筆標案，正在比對重複...`);

                // 3. 預先排除重複 (節省 API 額度)
                const checkRes = await callGas({ action: "checkDuplicates", items: items });
                const isDuplicate = checkRes.data;
                
                const newItems = items.filter((_, i) => !isDuplicate[i]);
                const duplicateCount = items.length - newItems.length;

                if (newItems.length === 0) {
                    showResult("批次完成", `這 5 筆資料都已經存過囉！(略過 ${duplicateCount} 筆)`, false);
                    updateProgress(100, "任務結束");
                    return;
                }

                updateProgress(20, `準備抓取 ${newItems.length} 筆新資料 (略過 ${duplicateCount} 筆重複)...`);

                // 4. 逐一抓取 (間隔 10 秒)
                for (let i = 0; i < newItems.length; i++) {
                    const item = newItems[i];
                    updateProgress(20 + ((i + 1) / newItems.length) * 70, `正在抓取 (${i + 1}/${newItems.length}): ${item.name}`);
                    
                    const res = await callGas({ url: item.url });
                    
                    if (res.status === "Success") {
                        addLog(item.url, "成功 (批次)");
                        sessionTotal++;
                        countTotal.innerText = sessionTotal;
                        updateQuotaUI(res.quotas || res.data?.quotas);
                    } else {
                        addLog(item.url, `失敗: ${res.message}`);
                    }

                    // 如果不是最後一筆，隨機等待 10 秒
                    if (i < newItems.length - 1) {
                        for (let sec = 10; sec > 0; sec--) {
                            updateProgress(20 + ((i + 1) / newItems.length) * 70, `等待冷卻中... ${sec}秒 (${i + 1}/${newItems.length} 已完成)`);
                            await new Promise(r => setTimeout(r, 1000));
                        }
                    }
                }

                showResult("批次完成", `成功處理 ${newItems.length} 筆標案，略過 ${duplicateCount} 筆重複。`, false);
                updateProgress(100, "全部完成！");

            } catch (error) {
                console.error(error);
                showResult("批次失敗", error.message, true);
            } finally {
                setLoading(false);
                fetchQuotas();
            }
        });

        async function callGas(params) {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(params)
            });
            return await response.json();
        }

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressInfo.innerText = text;
        }

        // 初始化
        fetchQuotas();
    </script>
</body>
</html>
